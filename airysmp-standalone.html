<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AirySMP — Official Stats</title>
<meta name="description" content="Official AirySMP Minecraft server stats. Join 75+ members on Discord." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#06101c; --card:rgba(15,28,46,.7); --border:rgba(120,170,230,.18);
    --fg:#e6f1ff; --muted:#8fa3bf; --primary:#4cc6ff; --secondary:#7df9c6;
    --glow:0 0 24px rgba(76,198,255,.55);
    --gradient:linear-gradient(135deg,#4cc6ff,#6a8bff 60%,#a26bff);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:Inter,system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{
    content:"";position:fixed;inset:0;z-index:-2;
    background:
      radial-gradient(1200px 600px at 20% 0%,rgba(76,198,255,.15),transparent 60%),
      radial-gradient(900px 500px at 90% 30%,rgba(162,107,255,.12),transparent 60%),
      var(--bg);
  }
  .watermark{position:fixed;inset:0;z-index:-1;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .watermark img{width:80vw;max-width:900px;opacity:.04;filter:blur(2px)}
  nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);background:rgba(6,16,28,.7);border-bottom:1px solid var(--border)}
  .nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
  .nav-inner img{height:40px;filter:drop-shadow(0 0 12px rgba(76,198,255,.6))}
  .btn{cursor:pointer;border:none;font-family:inherit;font-weight:700;transition:transform .2s,border-color .2s}
  .btn:hover{transform:scale(1.04)}
  .btn-primary{padding:10px 18px;border-radius:9999px;background:var(--gradient);color:#031018;font-size:14px;box-shadow:var(--glow)}
  .btn-ghost{padding:12px 22px;border-radius:9999px;background:var(--card);border:1px solid var(--border);color:var(--fg);display:inline-flex;align-items:center;gap:8px}
  .btn-ghost:hover{border-color:var(--primary)}
  section.hero{max-width:1200px;margin:0 auto;padding:24px 24px 40px;display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center}
  @media(max-width:800px){section.hero{grid-template-columns:1fr}}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:4px 12px;border-radius:9999px;background:var(--card);border:1px solid var(--border);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--secondary)}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:var(--secondary);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  h1{font-family:Orbitron,sans-serif;font-size:clamp(48px,7vw,88px);line-height:1;margin:24px 0 0;font-weight:800}
  .glow{color:var(--fg);text-shadow:0 0 24px rgba(76,198,255,.5)}
  .grad{background:var(--gradient);-webkit-background-clip:text;background-clip:text;color:transparent}
  .lead{margin-top:24px;color:var(--muted);font-size:18px;max-width:440px}
  .actions{margin-top:32px;display:flex;flex-wrap:wrap;gap:16px}
  .stats{margin-top:40px;display:flex;gap:32px}
  .stat p.v{font-family:Orbitron,sans-serif;font-size:30px;margin:0;text-shadow:0 0 16px rgba(76,198,255,.5)}
  .stat p.l{margin:4px 0 0;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .logo-wrap{position:relative;display:flex;justify-content:center}
  .logo-wrap::before{content:"";position:absolute;inset:0;background:var(--gradient);border-radius:50%;filter:blur(80px);opacity:.4;animation:glow 4s ease-in-out infinite}
  @keyframes glow{0%,100%{opacity:.3}50%{opacity:.55}}
  .logo-wrap img{position:relative;width:100%;max-width:320px;animation:float 6s ease-in-out infinite;filter:drop-shadow(0 20px 40px rgba(0,0,0,.5))}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  footer{border-top:1px solid var(--border);margin-top:40px}
  .foot-inner{max-width:1200px;margin:0 auto;padding:32px 24px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;color:var(--muted);font-size:14px}
  .foot-inner a{color:var(--muted);text-decoration:none}
  .foot-inner a:hover{color:var(--primary)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);padding:12px 20px;border-radius:9999px;opacity:0;transition:all .3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
